<!DOCTYPE html>
<html>

<head>
    <title>Javascript Assignment</title>
    <link rel="stylesheet" href="Style.css">
    <script src="assign.js"></script>
</head>

<body>

    <h1>Javascript Practice Assignment</h1>

   <!-- VARIABLES -->
    <div class="section">

        <h2>1. Variables</h2>

        <button onclick="showVariables()">
            Show Variables
        </button>

        <p id="variableOutput"></p>

    </div>


    <!-- DATATYPES -->
    <div class="section">

        <h2>2. Datatypes</h2>

        <button onclick="showDatatypes()">
            Check Datatypes
        </button>

        <p id="datatypeOutput"></p>

    </div>


    <!-- PRODUCT DETAILS -->
    <div class="section">

        <h2>3. Product Details</h2>

        <button onclick="showProduct()">
            Calculate Total Price
        </button>

        <p id="productOutput"></p>

    </div>


    <!-- OPERATORS -->
    <div class="section">

        <h2>4. Operators</h2>

        <input type="number" id="firstnumber" placeholder="Enter Your First Number">
        <br><br>

        <input type="number" id="secondnumber" placeholder="Enter Your Second Number">
        <br><br>

        <button onclick="showOperators()">
            Run Operators
        </button>

        <p id="operatorOutput"></p>

    </div>


    <!-- CONDITIONS -->
    <div class="section">

        <h2>5. Conditions</h2>

        <!--Age-->
        <input type="number" id="ageinput" placeholder="Enter a Age"><br>

        <button onclick="checkAge()">
            Check Age
        </button><br><br>

        <!--Even/Odd-->
        <input type="number" id="numberinput" placeholder="Enter a Number"><br>

        <button onclick="checkNumber()">
            Check Number
        </button><br><br>

        <!--Pass/Fail-->
        <input type="number" id="marksinput" placeholder="Enter a Marks"><br>

        <button onclick="checkResult()">
            Check Result
        </button><br><br>

        <!--Greater Number-->
        <input type="number" id="firstnumber" placeholder="Enter Frist Number"><br><br>
        <input type="number" id="secondnumber" placeholder="Enter Second Number"><br>

        <button onclick="findGreater()">
            Find Greater
        </button><br><br>

        <!--Positive/Negative-->
        <input type="number" id="valueinput" placeholder="Enter a Value"><br>

        <button onclick="checkValue()">
            Positive / Negative
        </button>

        <p id="conditionOutput"></p>

    </div>


    <!-- LOOPS -->
    <div class="section">

        <h2>6. Loops</h2>

        <button onclick="printNumbers()">
            Print 1 to 10
        </button>

        <button onclick="printEven()">
            Even Numbers
        </button>

        <button onclick="printTable()">
            Table of 5
        </button>

        <button onclick="reverseNumbers()">
            Reverse Numbers
        </button>

        <button onclick="findSum()">
            Find Sum
        </button>

        <p id="loopOutput"></p>

    </div>


    <!-- FUNCTIONS -->
    <div class="section">

        <h2>7. Functions</h2>

        <button onclick="showGreeting()">
            Greet Function
        </button>

        <button onclick="showAddition()">
            Add Function
        </button>

        <button onclick="showEvenOdd()">
            Even / Odd Function
        </button>

        <p id="functionOutput"></p>

    </div>


    <!-- EVENTS -->
    <div class="section">

        <h2>8. Events</h2>

        <button onclick="showAlert()">
            Show Alert
        </button>

        <button onclick="changeBackground()">
            Change Background
        </button>

        <button onclick="changeText()">
            Change Text
        </button>

        <h3 id="eventHeading">
            Hello Students
        </h3>

    </div>


    <!-- DOM -->
    <div class="section">

        <h2>9. DOM</h2>

        <button onclick="changeHeading()">
            Change Heading
        </button>

        <button onclick="changeColor()">
            Change Color
        </button>

        <h3 id="domHeading">
            Learning JavaScript
        </h3>

    </div>
</body>
</html>
